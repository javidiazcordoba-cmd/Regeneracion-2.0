<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artículos — Regeneración 2.0</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .filtros {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      justify-content: center;
    }
    .filtro-btn {
      padding: 0.4rem 1.1rem;
      border-radius: 20px;
      border: 2px solid var(--cafe);
      background: transparent;
      color: var(--cafe);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filtro-btn:hover,
    .filtro-btn.active {
      background: var(--cafe);
      color: var(--durazno);
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="Logo.png" alt="Regeneración 2.0" style="height:42px; width:auto;" />
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html#articulos">Artículos</a></li>
    <li><a href="eventos.html">Eventos</a></li>
    <li><a href="index.html#contacto">Contacto</a></li>
    <li><a href="index.html" class="nav-cta">Inicio</a></li>
  </ul>
  <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <h1>Artículos</h1>
  <p>Reflexiones, análisis y textos de nuestra agrupación</p>
</div>

<!-- CONTENIDO -->
<div class="page-content">

  <!-- Filtros por categoría -->
  <div class="filtros" id="filtros">
    <button class="filtro-btn active" data-cat="todos">Todos</button>
    <button class="filtro-btn" data-cat="Política">Política</button>
    <button class="filtro-btn" data-cat="Cultura">Cultura</button>
    <button class="filtro-btn" data-cat="Territorio">Territorio</button>
    <button class="filtro-btn" data-cat="Economía">Economía</button>
    <button class="filtro-btn" data-cat="Internacional">Internacional</button>
  </div>

  <div class="cards-grid" id="articulos-grid">
    <p style="text-align:center; color:var(--cafe-mid); font-family:'Lora',serif;">Cargando artículos...</p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2025 <strong>Regeneración 2.0</strong> — Todos los derechos reservados</p>
  <p style="margin-top:0.5rem;">
    <a href="index.html">Inicio</a> ·
    <a href="articulos.html">Artículos</a> ·
    <a href="eventos.html">Eventos</a> ·
    <a href="index.html#contacto">Contacto</a>
  </p>
</footer>

<script>
  // Hamburguesa
  document.getElementById('navToggle').addEventListener('click', () =>
    document.getElementById('navLinks').classList.toggle('open')
  );

  function renderCard(a) {
    const imgHtml = a.imagen
      ? `<img src="${a.imagen}" alt="${a.titulo}" style="width:100%;height:100%;object-fit:cover;">`
      : `<span style="font-size:0.8rem; opacity:0.4; color:var(--durazno);">Sin imagen</span>`;
    return `
      <article class="card" data-cat="${a.categoria}">
        <div class="card-img" style="height:180px; background:var(--cafe); display:flex; align-items:center; justify-content:center;">
          ${imgHtml}
        </div>
        <div class="card-body">
          <span class="card-tag">${a.categoria}</span>
          <h3>${a.titulo}</h3>
          <p>${a.resumen}</p>
          <div class="card-meta"><span>${a.fecha}</span><span>${a.lectura}</span></div>
          <a href="articulo.html?slug=${a.slug}" class="card-link">Leer más →</a>
        </div>
      </article>`;
  }

  let todosLosArticulos = [];

  fetch('articulos.json')
    .then(r => r.json())
    .then(articulos => {
      todosLosArticulos = articulos;
      const grid = document.getElementById('articulos-grid');
      grid.innerHTML = articulos.map(renderCard).join('');

      // Filtros
      document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const cat = btn.dataset.cat;
          document.querySelectorAll('#articulos-grid .card').forEach(card => {
            card.style.display = (cat === 'todos' || card.dataset.cat === cat) ? 'flex' : 'none';
          });
        });
      });
    });
</script>

</body>
</html>
